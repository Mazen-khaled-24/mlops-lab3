stages:

  preprocess:
    cmd: python preprocess.py
    deps:
      - preprocess.py
      - data/loan_approval.csv
    outs:
      - data/X_train.csv
      - data/X_test.csv
      - data/y_train.csv
      - data/y_test.csv

  train:
    cmd: python train.py
    deps:
      - train.py
      - data/X_train.csv
      - data/X_test.csv
      - data/y_train.csv
      - data/y_test.csv

  tune:
    cmd: python tune.py
    deps:
      - tune.py
      - data/X_train.csv
      - data/X_test.csv
      - data/y_train.csv
      - data/y_test.csv